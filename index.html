<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blanket</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --text: #3d3a36;
      --sub: #7a746d;
      --line: #d8d1c8;
      --accent: #8c6f56;
      --card: #fffdfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .desc {
      color: var(--sub);
      font-size: 0.95rem;
    }

    nav {
      margin-top: 16px;
      font-size: 0.95rem;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .note {
      margin-bottom: 28px;
      padding: 18px 18px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .date {
      display: block;
      margin-bottom: 8px;
      color: var(--sub);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    .text {
      font-size: 1rem;
      white-space: pre-wrap;
    }

    footer {
      margin-top: 48px;
      color: var(--sub);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      .wrap {
        padding: 32px 14px 60px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .note {
        padding: 16px 14px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>blank_et.</h1>
      <div class="desc">ひとこと日記 ￤ 小さなメモ ￤ 生活の切れ端</div>
      <nav>
        <a href="#">home</a>
        <a href="#">about</a>
      </nav>
    </header>

    <main>
      <article class="note">
        <span class="date">2026.03.31</span>
        <div class="text">雨。踏み台10分。息切れしたけど、始めただけでよしとしよう。</div>
      </article>

      <article class="note">
        <span class="date">2026.03.31</span>
        <div class="text">ひとこと日記の場所がほしいなと思ってた。これはそのはじまり。</div>
      </article>

      <article class="note">
        <span class="date">2026.03.30</span>
        <div class="text">おかゆを食べた。ヘルパーさんに料理のコツを教わった。</div>
      </article>

      <article class="note">
        <span class="date">2026.03.29</span>
        <div class="text">昔の個人サイトみたいな場所が、またほしくなってきた。</div>
      </article>
    </main>

    <footer>
      blank_et. / private text site
    </footer>
  </div>
</body>
</html>
